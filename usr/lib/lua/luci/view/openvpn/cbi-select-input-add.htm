<script>
	function vpn_add()
	{
		var vpn_name     = div_add.querySelector("#instance_name1").value.replace(/[^\x00-\x7F]|[\s\.!@#$%^&*()\-+=\[\]{};':"\\|,<>\/?]/g,'');
		var vpn_template = div_add.querySelector("#instance_template").value;
		var form         = document.getElementsByName('cbi')[0];

		if (!vpn_name || !vpn_name.length)
		{
			return info_message(vpn_output, "<%=pcdata(translate("The 'Name' field must not be empty!"))%>", 2000);
		}

		document.getElementById("instance_name1").value = vpn_name;
		if (document.getElementById("cbi-openvpn-" + vpn_name) != null)
		{
			return info_message(vpn_output, "<%=pcdata(translate("Instance with that name already exists!"))%>", 2000);
		}

		if (!vpn_template || !vpn_template.length)
		{
			return info_message(vpn_output, "<%=pcdata(translate("Please select a valid VPN template!"))%>", 2000);
		}

		if (form)
		{
			form.submit();
		}
	}

	function vpn_upload()
	{
		var vpn_name = div_upload.querySelector("#instance_name2").value.replace(/[^\x00-\x7F]|[\s\.!@#$%^&*()\-+=\[\]{};':"\\|,<>\/?]/g,'');
		var vpn_file = document.getElementById("ovpn_file").value;
		var form     = document.getElementsByName('cbi')[0];

		if (!vpn_name || !vpn_name.length)
		{
			return info_message(vpn_output, "<%=pcdata(translate("The 'Name' field must not be empty!"))%>", 2000);
		}

		document.getElementById("instance_name2").value = vpn_name;
		if (document.getElementById("cbi-openvpn-" + vpn_name) != null)
		{
			return info_message(vpn_output, "<%=pcdata(translate("Instance with that name already exists!"))%>", 2000);
		}

		if (!vpn_file || !vpn_file.length)
		{
			return info_message(vpn_output, "<%=pcdata(translate("Please select a valid OVPN config file to upload!"))%>", 2000);
		}

		if (form)
		{
			form.enctype = 'multipart/form-data';
			form.action  = '<%=url('admin/vpn/openvpn/upload')%>';
			form.submit();
		}
	}

	function info_message(output, msg, timeout)
	{
		timeout = timeout || 0;
		output.innerHTML = '<em>' + msg + '</em>';
		if (timeout > 0)
		{
			setTimeout(function(){ output.innerHTML=""}, timeout);
		}
	}
</script>

<%+openvpn/ovpn_css%>

<div class="cbi-section-node">
	<div class="table cbi-section-table">
		<h4><%:Template based configuration%></h4>
		<div class="tr cbi-section-table-row" id="div_add">
			<div class="td left">
				<input type="text" maxlength="20" placeholder="Instance name" name="cbi.cts.<%=self.config%>.<%=self.sectiontype%>.text" id="instance_name1" />
			</div>
			<div class="td left">
				<select id="instance_template" name="cbi.cts.<%=self.config%>.<%=self.sectiontype%>.select">
					<option value="" selected="selected" disabled="disabled"><%:Select template ...%></option>
					<%- for k, v in luci.util.kspairs(self.add_select_options) do %>
						<option value="<%=k%>"><%=luci.xml.pcdata(v)%></option>
					<% end -%>
				</select>
			</div>
			<div class="td left">
				<input class="btn cbi-button cbi-button-add" type="submit" onclick="vpn_add(); return false;" value="<%:Add%>" title="<%:Add template based configuration%>" /><br />
			</div>
		</div>
		<h4><%:OVPN configuration file upload%></h4>
		<div class="tr cbi-section-table-row" id="div_upload">
			<div class="td left">
				<input type="text" maxlength="20" placeholder="Instance name" name="instance_name2" id="instance_name2" />
			</div>
			<div class="td left">
				<input type="file" name="ovpn_file" id="ovpn_file" accept="application/x-openvpn-profile,.ovpn" />
			</div>
			<div class="td left">
				<input class="btn cbi-button cbi-button-add" type="submit" onclick="vpn_upload(); return false;" value="<%:Upload%>" title="<%:Upload ovpn file%>" />
			</div>
		</div>
	</div>
	<div class="vpn-output">
		<span id="vpn_output"></span>
	</div>

    <div style="margin-top: 15px; margin-bottom: 5px; text-align: left;">
        <input class="btn cbi-button cbi-button-add" type="button" value="Tai file IP dang chay" onclick="exportRunningIPs()" style="background-color: #28a745; color: white; border-color: #28a745; padding: 5px 15px; font-weight: bold;" title="Trích xuat danh sách IP cua OpenVPN dang chay" />
    </div>
</div>

<script>
// --- CH?C NANG 1: T? Ð?NG HI?N TH? IP C?NH TÊN TUN KHI LOAD TRANG ---
document.addEventListener("DOMContentLoaded", function() {
    setTimeout(function() {
        if (!window.L || !L.env || !L.env.sessionid) return;

        document.querySelectorAll('tr.cbi-section-table-row').forEach(function(row) {
            var activeCell = row.querySelector('.cbi-value-field[data-name="_active"] div');
            var nameCell = row.querySelector('.cbi-value-field[data-name="config"] div');
            
            // L?y tên nguyên b?n t? data-title (R?t an toàn, không s? b? thay d?i do JS)
            var tunName = row.getAttribute('data-title');

            if (tunName && activeCell && activeCell.textContent.includes('yes') && nameCell) {
                // Tìm dúng cái text node ch?a tên d? chèn IP vào
                var targetNode = Array.from(nameCell.childNodes).find(n => n.nodeType === Node.TEXT_NODE && n.nodeValue.trim() !== "");
                
                if (targetNode) {
                    fetch('/ubus/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: '2.0', id: 1, method: 'call',
                            params: [L.env.sessionid, 'file', 'read', { path: '/etc/openvpn/' + tunName + '.ovpn' }]
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.result && data.result[1] && data.result[1].data) {
                            var match = data.result[1].data.match(/^\s*remote\s+([^\s]+)/m);
                            if (match && match[1]) {
                                // Ghi IP vào text c?nh tên
                                targetNode.nodeValue = "\n" + tunName + " (" + match[1] + ")";
                            }
                        }
                    }).catch(err => console.error(err));
                }
            }
        });
    }, 800); 
});

// --- CH?C NANG 2: XU?T IP RA FILE TXT KHI B?M NÚT ---
function exportRunningIPs() {
    var promises = [];
    var results = [];

    if (!window.L || !L.env || !L.env.sessionid) {
        alert("L?i: Không tìm th?y phiên k?t n?i (session) LuCI.");
        return;
    }

    var btn = event.target;
    var originalText = btn.value;
    btn.value = "Ðang x? lý...";
    btn.disabled = true;

    // Quét tìm các tun dang "yes"
    document.querySelectorAll('tr.cbi-section-table-row').forEach(function(row) {
        var activeCell = row.querySelector('.cbi-value-field[data-name="_active"] div');
        // L?y l?i tên nguyên b?n chu?n xác
        var tunName = row.getAttribute('data-title');

        if (tunName && activeCell && activeCell.textContent.includes('yes')) {
            var p = fetch('/ubus/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: '2.0', id: 1, method: 'call',
                    params: [L.env.sessionid, 'file', 'read', { path: '/etc/openvpn/' + tunName + '.ovpn' }]
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data && data.result && data.result[1] && data.result[1].data) {
                    var match = data.result[1].data.match(/^\s*remote\s+([^\s]+)/m);
                    if (match && match[1]) {
                        results.push(match[1]); // C?t IP vào m?ng
                    }
                }
            }).catch(err => console.error(err));

            promises.push(p);
        }
    });

    if (promises.length === 0) {
        alert("Hi?n t?i không có ti?n trình OpenVPN nào dang ch?y!");
        btn.value = originalText;
        btn.disabled = false;
        return;
    }

    // Ch? cho T?T C? các file c?u hình du?c d?c xong
    Promise.all(promises).then(function() {
        btn.value = originalText;
        btn.disabled = false;

        if (results.length > 0) {
            var textToSave = results.join("\n"); // Format thành các dòng g?n gàng

            // Trình duy?t t? t?i file v?
            var blob = new Blob([textToSave], { type: "text/plain;charset=utf-8" });
            var url = window.URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "danh_sach_ip.txt"; // Tên file t?i v?
            document.body.appendChild(a);
            a.click();
            
            setTimeout(function() {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        } else {
            alert("Không tìm th?y IP nào trong các file c?u hình dang ch?y.");
        }
    });
}
</script>
